<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💥 漫畫單字大挑戰 - 首頁 💥</title>
  <style>
    /* 全域漫畫風格設定 */
    :root {
      --primary-yellow: #FFEB3B;
      --comic-blue: #2196F3;
      --comic-red: #F44336;
      --comic-green: #4CAF50;
      --border-color: #000;
      --text-color: #000;
    }

    body { 
      font-family: 'Bangers', 'Comic Sans MS', cursive, sans-serif;
      background-color: #f0f0f0; 
      background-image: radial-gradient(#ddd 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-color);
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
    }

    .comic-box {
      border: 4px solid var(--border-color);
      box-shadow: 8px 8px 0px var(--border-color);
      background-color: white;
      border-radius: 4px;
    }

    .main-title {
      font-size: 4.5em;
      text-transform: uppercase;
      color: var(--primary-yellow);
      -webkit-text-stroke: 3px var(--border-color);
      text-shadow: 6px 6px 0px var(--border-color);
      margin-bottom: 40px;
      transform: rotate(-3deg);
      text-align: center;
      line-height: 1.1;
    }

    .main-title span {
      display: block;
      font-size: 0.5em;
      color: var(--comic-red);
      -webkit-text-stroke: 2px var(--border-color);
      text-shadow: 4px 4px 0px var(--border-color);
      transform: rotate(2deg);
      margin-top: 10px;
    }

    /* === 選單容器 === */
    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 25px;
      width: 100%;
      max-width: 450px;
    }

    /* === 選單按鈕共通樣式 === */
    .menu-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-decoration: none;
      color: white;
      border: 4px solid var(--border-color);
      box-shadow: 6px 6px 0px var(--border-color);
      border-radius: 10px;
      transition: 0.1s ease-in-out;
      cursor: pointer;
    }

    .menu-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0px var(--border-color);
    }
    
    .menu-btn:active {
      transform: translate(6px, 6px);
      box-shadow: 0px 0px 0px var(--border-color);
    }

    .btn-title {
      font-size: 2.2em;
      font-weight: 900;
      margin-bottom: 5px;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0px #000;
    }

    .btn-desc {
      font-size: 1.1em;
      font-weight: bold;
      background: white;
      color: black;
      padding: 4px 12px;
      border: 2px solid #000;
      border-radius: 20px;
    }

    .btn-create { background-color: var(--comic-green); transform: rotate(-1deg); }
    .btn-game { background-color: var(--comic-red); transform: rotate(1deg); }
    .btn-quiz { background-color: var(--comic-blue); transform: rotate(-1deg); }

    /* 裝飾性元素 */
    .pow-badge {
      position: fixed;
      top: 50px;
      right: 50px;
      background: var(--comic-red);
      color: white;
      font-size: 2em;
      font-weight: bold;
      padding: 20px;
      border-radius: 50%;
      border: 4px solid #000;
      box-shadow: 5px 5px 0px #000;
      transform: rotate(15deg);
      z-index: -1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pow-badge::before {
      content: '';
      position: absolute;
      top: -10px; right: -10px; bottom: -10px; left: -10px;
      background: var(--primary-yellow);
      z-index: -1;
      transform: rotate(45deg);
      border: 4px solid #000;
    }

    /* === 密碼彈出視窗 (Modal) 樣式 === */
    #modalOverlay {
      display: none; 
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border: 5px solid var(--border-color);
      box-shadow: 10px 10px 0px var(--primary-yellow);
      border-radius: 10px;
      text-align: center;
      transform: rotate(-2deg);
      max-width: 350px;
      width: 90%;
    }

    .modal-content h2 {
      font-size: 2em;
      color: var(--comic-red);
      margin-top: 0;
      text-transform: uppercase;
      -webkit-text-stroke: 1px #000;
    }

    .modal-content input {
      width: 100%;
      padding: 15px;
      font-size: 1.2em;
      margin: 20px 0;
      border: 3px solid #000;
      border-radius: 5px;
      box-sizing: border-box;
      font-weight: bold;
      text-align: center;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 15px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      border: 3px solid #000;
      border-radius: 5px;
      box-shadow: 4px 4px 0px #000;
    }
    .modal-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px #000;
    }
    .btn-confirm { background: var(--comic-green); color: white; }
    .btn-cancel { background: #ccc; color: black; }

    @media (max-width: 600px) {
      .main-title { font-size: 3.5em; }
      .pow-badge { display: none; }
    }
  </style>
</head>
<body>

  <div class="pow-badge">POW!</div>

  <h1 class="main-title">
    Vocab Master
    <span>單字測驗系統</span>
  </h1>

  <div class="menu-container">
    
    <div onclick="showModal()" class="menu-btn btn-create">
      <div class="btn-title">➕ CREATE</div>
      <div class="btn-desc">批次建立專屬題庫 (限管理員)</div>
    </div>

    <a href="game.html" class="menu-btn btn-game">
      <div class="btn-title">🎮 GAME MODE</div>
      <div class="btn-desc">30秒競速挑戰，即時回饋</div>
    </a>

    <a href="quiz.html" class="menu-btn btn-quiz">
      <div class="btn-title">📝 EXAM MODE</div>
      <div class="btn-desc">100分制正式測驗，考後訂正</div>
    </a>

  </div>

  <div id="modalOverlay">
    <div class="modal-content">
      <h2>⚠️ TOP SECRET!</h2>
      <p style="font-weight: bold; font-size: 1.1em;">請輸入管理員密碼：</p>
      <input type="password" id="adminPassword" placeholder="Enter Password">
      <div id="errorMsg" style="color: red; font-weight: bold; margin-bottom: 15px; display: none;">密碼錯誤！</div>
      <div class="modal-btns">
        <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn btn-confirm" onclick="checkPassword()">進入</button>
      </div>
    </div>
  </div>

  <script>
    // --- 密碼邏輯區 ---
    
    // 你可以在這裡修改你的專屬密碼！
    const SECRET_PASSWORD = "123"; 

    const overlay = document.getElementById('modalOverlay');
    const pwdInput = document.getElementById('adminPassword');
    const errorMsg = document.getElementById('errorMsg');

    // 顯示密碼視窗
    function showModal() {
      overlay.style.display = 'flex';
      pwdInput.value = ''; // 清空上次輸入
      errorMsg.style.display = 'none';
      pwdInput.focus();
    }

    // 關閉密碼視窗
    function closeModal() {
      overlay.style.display = 'none';
    }

    // 驗證密碼
    function checkPassword() {
      if (pwdInput.value === SECRET_PASSWORD) {
        // 密碼正確，導向建立題庫頁面
        window.location.href = "create.html";
      } else {
        // 密碼錯誤
        errorMsg.style.display = 'block';
        pwdInput.value = ''; // 清空輸入框讓使用者重打
        pwdInput.focus();
      }
    }

    // 讓使用者按 Enter 鍵也能送出密碼
    pwdInput.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        checkPassword();
      }
    });
  </script>

</body>
</html>
