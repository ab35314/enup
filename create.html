<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>建立題庫 - 強制20筆與批次上傳</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 30px auto; padding: 0 20px; line-height: 1.6; }
    .header-section { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
    .row-num { width: 30px; color: #888; font-size: 0.9em; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 20px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
    
    #saveBtn { background-color: #4CAF50; color: white; width: 100%; font-size: 1.1em; margin-top: 20px; }
    #batchToggleBtn { background-color: #2196F3; color: white; }
    #addRowBtn { background-color: #888; color: white; }

    /* 批次上傳區域樣式 */
    #batchSection { 
      display: none; 
      background: #e3f2fd; 
      padding: 20px; 
      border-radius: 8px; 
      margin-bottom: 20px; 
      border: 1px dashed #2196F3;
    }
    textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; box-sizing: border-box; }
    .hint { font-size: 0.85em; color: #555; }
  </style>
</head>
<body>

  <div class="header-section">
    <h2>➕ 建立新題庫</h2>
    <p class="hint">注意：為了維持遊戲品質，每個題庫必須包含 <strong>至少 20 組</strong> 單字。</p>
    <input type="text" id="bankTitle" placeholder="請輸入題庫名稱 (例如: 多益重點單字)" style="font-size: 1.1em;">
    <div style="margin-top: 15px; display: flex; gap: 10px;">
      <button id="batchToggleBtn">📦 批次貼上單字</button>
      <button id="addRowBtn">➕ 新增更多列</button>
    </div>
  </div>

  <div id="batchSection">
    <h4>批次貼上資料</h4>
    <p class="hint">格式說明：每行一組單字，英文與中文之間用「逗號」或「空白」隔開。<br>範例：<br>Apple, 蘋果<br>Banana, 香蕉</p>
    <textarea id="batchInput" placeholder="在此貼上多筆資料..."></textarea>
    <button id="importBtn" style="background-color: #2196F3; color: white;">確認匯入</button>
    <button id="closeBatchBtn" style="background-color: #bbb;">取消</button>
  </div>

  <div id="wordList">
    </div>

  <button id="saveBtn">💾 儲存題庫 (需滿 20 筆)</button>
  <br><br>
  <center><a href="index.html">回首頁</a></center>

  <script type="module">
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { db } from './firebase-config.js';

    const wordListDiv = document.getElementById('wordList');
    const REQUIRED_COUNT = 20;

    // 1. 初始化生成 20 列輸入框
    function createRows(count) {
      for (let i = 0; i < count; i++) {
        addSingleRow();
      }
    }

    function addSingleRow(engVal = '', chiVal = '') {
      const currentCount = wordListDiv.querySelectorAll('.row').length + 1;
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="row-num">${currentCount}</div>
        <input type="text" class="eng" placeholder="英文" value="${engVal}">
        <input type="text" class="chi" placeholder="中文" value="${chiVal}">
      `;
      wordListDiv.appendChild(row);
    }

    // 2. 批次解析邏輯
    document.getElementById('batchToggleBtn').onclick = () => {
      document.getElementById('batchSection').style.display = 'block';
    };
    document.getElementById('closeBatchBtn').onclick = () => {
      document.getElementById('batchSection').style.display = 'none';
    };

    document.getElementById('importBtn').onclick = () => {
      const rawText = document.getElementById('batchInput').value.trim();
      if (!rawText) return;

      const lines = rawText.split('\n');
      // 清空目前的列表（可選，這裡選擇追加）
      lines.forEach(line => {
        // 支援用逗號、分號或空格切割
        const parts = line.split(/[,，\s\t]+/).filter(p => p.trim() !== '');
        if (parts.length >= 2) {
          addSingleRow(parts[0], parts[1]);
        }
      });

      document.getElementById('batchInput').value = '';
      document.getElementById('batchSection').style.display = 'none';
      alert('匯入完成！請確認列表內容。');
    };

    // 3. 儲存與驗證邏輯
    document.getElementById('addRowBtn').onclick = () => addSingleRow();

    document.getElementById('saveBtn').onclick = async () => {
      const title = document.getElementById('bankTitle').value.trim();
      const rows = document.querySelectorAll('.row');
      const words = [];

      rows.forEach(row => {
        const eng = row.querySelector('.eng').value.trim();
        const chi = row.querySelector('.chi').value.trim();
        if (eng && chi) {
          words.push({ eng, chi });
        }
      });

      // 關鍵驗證：標題與筆數
      if (!title) {
        alert("請輸入題庫標題！");
        return;
      }
      if (words.length < REQUIRED_COUNT) {
        alert(`資料不足！目前僅有 ${words.length} 筆，還需要 ${REQUIRED_COUNT - words.length} 筆才能儲存。`);
        return;
      }

      try {
        await addDoc(collection(db, "banks"), { 
          title: title, 
          words: words,
          createdAt: new Date() 
        });
        alert("🎉 成功建立 20 筆以上的題庫！");
        window.location.href = 'index.html';
      } catch (e) {
        console.error(e);
        alert("儲存失敗，請檢查網路或 Firebase 設定。");
      }
    };

    // 執行初始化
    createRows(REQUIRED_COUNT);
  </script>
</body>
</html>
