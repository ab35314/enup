<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>建立題庫</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 30px auto; padding: 0 20px; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; }
    input { flex: 1; padding: 8px; }
    button { padding: 10px 15px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>建立新題庫</h2>
  <input type="text" id="bankTitle" placeholder="請輸入題庫名稱 (例如: 多益 Week 1)" style="width: 100%; margin-bottom: 20px;">
  
  <div id="wordList">
    <div class="row">
      <input type="text" class="eng" placeholder="英文單字">
      <input type="text" class="chi" placeholder="中文意思">
    </div>
  </div>

  <button id="addRowBtn">➕ 新增一列</button>
  <button id="saveBtn" style="background-color: #2196F3; color: white;">💾 儲存題庫</button>
  <br><br>
  <a href="index.html">回首頁</a>

  <script type="module">
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { db } from './firebase-config.js';

    document.getElementById('addRowBtn').addEventListener('click', () => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <input type="text" class="eng" placeholder="英文單字">
        <input type="text" class="chi" placeholder="中文意思">
      `;
      document.getElementById('wordList').appendChild(row);
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const title = document.getElementById('bankTitle').value;
      const rows = document.querySelectorAll('.row');
      const words = [];

      rows.forEach(row => {
        const eng = row.querySelector('.eng').value.trim();
        const chi = row.querySelector('.chi').value.trim();
        if(eng && chi) words.push({ eng, chi });
      });

      if(!title || words.length === 0) {
        alert("請輸入標題且至少包含一組單字！");
        return;
      }

      try {
        await addDoc(collection(db, "banks"), { title: title, words: words });
        alert("題庫建立成功！");
        window.location.href = 'index.html';
      } catch (e) {
        console.error("寫入錯誤: ", e);
        alert("儲存失敗，請檢查控制台。");
      }
    });
  </script>
</body>
</html>
