<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>💥 漫畫單字大挑戰 💥</title>
  <style>
    /* 全域漫畫風格設定 */
    :root {
      --primary-yellow: #FFEB3B;
      --comic-blue: #2196F3;
      --comic-red: #F44336;
      --comic-green: #4CAF50;
      --border-color: #000;
      --text-color: #000;
    }

    body { 
      font-family: 'Bangers', 'Comic Sans MS', cursive, sans-serif; /* 嘗試載入漫畫風字體，若無則用備用 */
      background-color: #f0f0f0; 
      background-image: radial-gradient(#ddd 1px, transparent 1px); /* 微小的網點背景 */
      background-size: 20px 20px;
      color: var(--text-color);
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 粗邊框與剛硬陰影的通用樣式 */
    .comic-box {
      border: 4px solid var(--border-color);
      box-shadow: 7px 7px 0px var(--border-color);
      background-color: white;
      border-radius: 4px;
    }

    h2.main-title {
      font-size: 3em;
      text-transform: uppercase;
      color: var(--comic-red);
      -webkit-text-stroke: 2px var(--border-color);
      text-shadow: 4px 4px 0px var(--border-color);
      margin-bottom: 10px;
      transform: rotate(-2deg);
    }

    /* === 1. 題庫選擇大廳樣式 === */
    #lobbyContainer {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 30px;
      margin-top: 50px;
    }

    #bankList {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
    }

    .bank-btn {
      padding: 20px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      background-color: var(--comic-blue);
      color: white;
      border: 3px solid var(--border-color);
      box-shadow: 5px 5px 0px var(--border-color);
      border-radius: 4px;
      transition: 0.1s;
    }
    .bank-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0px var(--border-color);
    }
    .bank-btn:active {
      transform: translate(5px, 5px);
      box-shadow: 0px 0px 0px var(--border-color);
    }

    /* === 2. 遊戲主畫面樣式 === */
    #gameContainer { 
      display: none; /* 初始隱藏 */
      width: 100%;
      max-width: 700px;
    }

    .status-bar { 
      display: flex; 
      justify-content: space-between; 
      font-size: 1.2em; 
      font-weight: bold; 
      background-color: var(--primary-yellow); 
      padding: 15px; 
      margin-bottom: 20px;
      transform: rotate(1deg);
    }
    
    #timer { 
      color: white; 
      background-color: var(--comic-red);
      padding: 5px 15px;
      border: 2px solid #000;
    }

    /* 題目對話框風格 */
    #questionArea {
      position: relative;
      background: white;
      border: 4px solid #000;
      border-radius: 50px;
      padding: 40px;
      margin-bottom: 40px;
      text-align: center;
      box-shadow: 8px 8px 0px #000;
    }
    /* 對話框小尾巴 */
    #questionArea:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 0;
      border: 30px solid transparent;
      border-top-color: #000;
      border-bottom: 0;
      border-left: 0;
      margin-left: -15px;
      margin-bottom: -30px;
    }

    #question { 
      font-size: 3.5em; 
      font-weight: 900; 
      color: #000;
      margin: 0;
    }

    .options { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
    }

    .option-btn { 
      padding: 25px; 
      font-size: 1.3em; 
      font-weight: bold;
      cursor: pointer; 
      border: 4px solid var(--border-color); 
      background-color: white; 
      border-radius: 8px; 
      box-shadow: 6px 6px 0px var(--border-color);
      transition: 0.1s;
    }
    .option-btn:hover:not(:disabled) { 
      background-color: #fdf5e6;
      transform: scale(1.03);
    }
    
    /* 正確與錯誤的反饋樣式 */
    .correct { 
      background-color: var(--comic-green) !important; 
      color: white; 
      animation: shake 0.5s; /* 正確時抖動一下 */
    }
    .wrong { 
      background-color: var(--comic-red) !important; 
      color: white; 
      text-decoration: line-through;
    }

    #nextBtn { 
      display: none; 
      margin: 40px auto 0 auto;
      padding: 15px 40px; 
      font-size: 1.5em; 
      background-color: var(--primary-yellow); 
      color: black; 
      border: 4px solid #000;
      box-shadow: 6px 6px 0px #000;
      cursor: pointer; 
      font-weight: bold;
      text-transform: uppercase;
    }
    #nextBtn:hover {
      background-color: #ffca28;
    }

    /* === 3. 遊戲結束結果樣式 === */
    #resultContainer { 
      display: none; 
      text-align: center;
      margin-top: 50px;
      padding: 40px;
    }
    #finalScore { 
      font-size: 6em; 
      color: var(--comic-green); 
      -webkit-text-stroke: 3px #000;
      text-shadow: 6px 6px 0px #000;
      margin: 20px 0; 
      transform: scale(1.1) rotate(-3deg);
    }

    /* 動畫效果：抖動 */
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      50% { transform: translate(1px, -1px) rotate(1deg); }
      70% { transform: translate(-1px, 2px) rotate(-1deg); }
      100% { transform: translate(1px, -2px) rotate(0deg); }
    }

    .back-home { margin-top: 50px; text-decoration: none; color: #555; font-weight: bold; border-bottom: 2px solid #555; }
  </style>
</head>
<body>

  <h2 class="main-title">Vocab Challenge</h2>
  
  <div id="lobbyContainer" class="comic-box">
    <h3>💥 Select Your Mission! 💥</h3>
    <p>請選擇一個題庫開始挑戰 (需包含20個單字以上)</p>
    <div id="loadingText">正在連線 Firebase 撈取題庫...</div>
    <div id="bankList">
      </div>
  </div>

  <div id="gameContainer">
    <div class="status-bar comic-box">
      <div id="currentBankName">題庫: --</div>
      <div id="progress">NO. 1 / 20</div>
      <div id="timer">⏱️ 30</div>
    </div>
    
    <div class="status-bar comic-box" style="background-color: white; margin-top: -10px; margin-bottom: 30px;">
        <div id="scoreText">SCORE: 0</div>
    </div>

    <div id="questionArea">
        <p id="question">POW!</p>
    </div>

    <div class="options" id="optionsContainer">
        </div>
    
    <center><button id="nextBtn">Next Question ▶️</button></center>
  </div>

  <div id="resultContainer" class="comic-box">
    <h2 style="font-size: 3em; color: var(--comic-blue);">MISSION COMPLETE!</h2>
    <p>Your Final Score is...</p>
    <div id="finalScore">0</div>
    <button class="bank-btn" onclick="location.reload()">Play Again?</button>
  </div>
  
  <br><a href="index.html" class="back-home">回首頁</a>

  <script type="module">
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { db } from './firebase-config.js';

    // 遊戲狀態變數
    let allBanks = [];       // 儲存從 Firebase 拿到的所有題庫
    let words = [];          // 當前遊玩的單字陣列
    let currentBankTitle = "";
    let currentQuestionIndex = 0;
    let score = 0;
    const MAX_QUESTIONS = 20; 
    const TIME_LIMIT = 30;    
    
    let timeLeft = TIME_LIMIT;
    let timerInterval;
    let currentQuestion = {};

    // === A. 大廳邏輯：載入並顯示題庫列表 ===
    async function initLobby() {
      try {
        const querySnapshot = await getDocs(collection(db, "banks"));
        document.getElementById('loadingText').style.display = 'none';
        
        if(querySnapshot.empty) {
          document.getElementById('bankList').innerHTML = "<p>目前沒有題庫，請先去建立！</p>";
          return;
        }

        const container = document.getElementById('bankList');
        
        querySnapshot.forEach((doc) => {
          const bankData = doc.data();
          // 檢查單字量是否足夠 20 筆
          if(bankData.words && bankData.words.length >= 20) {
            allBanks.push(bankData); // 存入陣列供後續使用
            
            const btn = document.createElement('button');
            btn.className = 'bank-btn';
            btn.innerText = bankData.title;
            // 點擊後開始遊戲
            btn.onclick = () => startGame(bankData.title);
            container.appendChild(btn);
          }
        });

        if(allBanks.length === 0) {
            document.getElementById('bankList').innerHTML = "<p>找不到包含 20 筆以上單字的題庫，請先去建立完整的題庫。</p>";
        }

      } catch (error) {
        console.error("載入題庫失敗:", error);
        document.getElementById('loadingText').innerText = "連線失敗，請檢查網路或 Firebase 設定。";
      }
    }

    // === B. 遊戲核心邏輯 ===
    
    // 1. 開始遊戲：切換畫面並初始化單字
    function startGame(bankTitle) {
      // 找到對應的題庫資料
      const selectedBank = allBanks.find(b => b.title === bankTitle);
      if(!selectedBank) return;

      words = selectedBank.words;
      currentBankTitle = bankTitle;

      // 切換顯示容器
      document.getElementById('lobbyContainer').style.display = 'none';
      document.getElementById('gameContainer').style.display = 'block';
      document.getElementById('currentBankName').innerText = `Mission: ${currentBankTitle}`;
      
      currentQuestionIndex = 0;
      score = 0;
      document.getElementById('scoreText').innerText = `SCORE: 0`;

      renderQuestion();
    }

    // 2. 渲染題目 (保持先前的邏輯，加上漫畫風)
    function renderQuestion() {
      if(currentQuestionIndex >= MAX_QUESTIONS) {
        endGame();
        return;
      }

      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('progress').innerText = `NO. ${currentQuestionIndex + 1} / ${MAX_QUESTIONS}`;
      startTimer();

      const isEngToChi = Math.random() < 0.5;
      const correctWord = words[Math.floor(Math.random() * words.length)];
      
      currentQuestion = {
        question: isEngToChi ? correctWord.eng : correctWord.chi,
        answer: isEngToChi ? correctWord.chi : correctWord.eng
      };

      document.getElementById('question').innerText = currentQuestion.question;

      // 調整字型大小以適應較長的單字
      if(currentQuestion.question.length > 10) {
          document.getElementById('question').style.fontSize = '2.5em';
      } else {
          document.getElementById('question').style.fontSize = '3.5em';
      }

      let options = [currentQuestion.answer];
      while(options.length < 4) {
        let randomWord = words[Math.floor(Math.random() * words.length)];
        let wrongOption = isEngToChi ? randomWord.chi : randomWord.eng;
        if(!options.includes(wrongOption)) options.push(wrongOption);
      }
      options.sort(() => Math.random() - 0.5);

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt);
        container.appendChild(btn);
      });
    }

    // 3. 計時器與計分 (保持先前邏輯)
    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = TIME_LIMIT;
      document.getElementById('timer').innerText = `⏱️ ${timeLeft}`;
      
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `⏱️ ${timeLeft}`;
        if(timeLeft <= 0) {
          clearInterval(timerInterval);
          timeUp();
        }
      }, 1000);
    }

    function checkAnswer(btn, selected) {
      clearInterval(timerInterval);
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true); 

      if (selected === currentQuestion.answer) {
        btn.classList.add('correct');
        const pointsEarned = timeLeft * 10;
        score += pointsEarned;
        document.getElementById('scoreText').innerText = `SCORE: ${score}`;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => {
          if(b.innerText === currentQuestion.answer) b.classList.add('correct');
        });
      }
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function timeUp() {
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true);
      allBtns.forEach(b => {
        if(b.innerText === currentQuestion.answer) b.classList.add('correct');
      });
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function endGame() {
      document.getElementById('gameContainer').style.display = 'none';
      document.getElementById('resultContainer').style.display = 'block';
      document.getElementById('finalScore').innerText = score;
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentQuestionIndex++;
      renderQuestion();
    });
    
    // 初始化大廳
    initLobby();
  </script>
</body>
</html>
