<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>💥 漫畫單字大挑戰 💥</title>
  <style>
    :root {
      --primary-yellow: #FFEB3B;
      --comic-blue: #2196F3;
      --comic-red: #F44336;
      --comic-green: #4CAF50;
      --border-color: #000;
      --text-color: #000;
    }

    body { 
      font-family: 'Bangers', 'Comic Sans MS', cursive, sans-serif;
      background-color: #f0f0f0; 
      background-image: radial-gradient(#ddd 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-color);
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .comic-box {
      border: 4px solid var(--border-color);
      box-shadow: 7px 7px 0px var(--border-color);
      background-color: white;
      border-radius: 4px;
    }

    h2.main-title {
      font-size: 3em;
      text-transform: uppercase;
      color: var(--comic-red);
      -webkit-text-stroke: 2px var(--border-color);
      text-shadow: 4px 4px 0px var(--border-color);
      margin-bottom: 10px;
      transform: rotate(-2deg);
    }

    /* === 1. 大廳 === */
    #lobbyContainer { width: 100%; max-width: 600px; text-align: center; padding: 30px; margin-top: 50px; }
    
    /* 觀看英雄榜大按鈕 */
    .btn-view-boards {
      background-color: var(--primary-yellow);
      color: black;
      font-size: 1.3em;
      padding: 15px 30px;
      border: 4px solid #000;
      box-shadow: 5px 5px 0px #000;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
      margin-bottom: 20px;
      transition: 0.1s;
    }
    .btn-view-boards:hover { transform: translate(2px, 2px); box-shadow: 3px 3px 0px #000; background-color: #ffca28; }

    #bankList { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; border-top: 3px dashed #ccc; padding-top: 20px; }
    .bank-btn {
      padding: 20px; font-size: 1.2em; font-weight: bold; cursor: pointer;
      background-color: var(--comic-blue); color: white; border: 3px solid var(--border-color);
      box-shadow: 5px 5px 0px var(--border-color); border-radius: 4px; transition: 0.1s;
    }
    .bank-btn:hover { transform: translate(2px, 2px); box-shadow: 3px 3px 0px var(--border-color); }

    /* === 名人堂 (總排行榜) 畫面 === */
    #globalLeaderboardContainer {
      display: none; width: 100%; max-width: 800px; text-align: center; padding: 30px; margin-top: 20px;
    }
    .board-card {
      background-color: #fff9c4; border: 4px solid #000; border-radius: 8px;
      padding: 20px; margin-bottom: 25px; box-shadow: 6px 6px 0px #000; text-align: left;
    }
    .board-title {
      font-size: 1.6em; color: var(--comic-blue); margin-top: 0;
      border-bottom: 3px solid #000; padding-bottom: 10px; text-transform: uppercase;
    }

    /* === 2. 遊戲主畫面 === */
    #gameContainer { display: none; width: 100%; max-width: 700px; }
    .status-bar { 
      display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; 
      background-color: var(--primary-yellow); padding: 15px; margin-bottom: 20px; transform: rotate(1deg);
    }
    #timer { color: white; background-color: var(--comic-red); padding: 5px 15px; border: 2px solid #000; }

    #questionArea {
      position: relative; background: white; border: 4px solid #000; border-radius: 50px;
      padding: 40px; margin-bottom: 40px; text-align: center; box-shadow: 8px 8px 0px #000;
    }
    #questionArea:after {
      content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 0;
      border: 30px solid transparent; border-top-color: #000; border-bottom: 0; border-left: 0;
      margin-left: -15px; margin-bottom: -30px;
    }
    #question { font-size: 3.5em; font-weight: 900; color: #000; margin: 0; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .option-btn { 
      padding: 25px; font-size: 1.3em; font-weight: bold; cursor: pointer; border: 4px solid var(--border-color); 
      background-color: white; border-radius: 8px; box-shadow: 6px 6px 0px var(--border-color); transition: 0.1s;
    }
    .option-btn:hover:not(:disabled) { background-color: #fdf5e6; transform: scale(1.03); }
    .correct { background-color: var(--comic-green) !important; color: white; }
    .wrong { background-color: var(--comic-red) !important; color: white; text-decoration: line-through; }

    #nextBtn { 
      display: none; margin: 40px auto 0 auto; padding: 15px 40px; font-size: 1.5em; 
      background-color: var(--primary-yellow); color: black; border: 4px solid #000;
      box-shadow: 6px 6px 0px #000; cursor: pointer; font-weight: bold;
    }
    
    /* === 3. 遊戲結果與排行榜 === */
    #resultContainer { display: none; text-align: center; margin-top: 20px; padding: 40px; width: 100%; max-width: 600px; }
    #finalScore { font-size: 5em; color: var(--comic-green); -webkit-text-stroke: 3px #000; text-shadow: 5px 5px 0px #000; margin: 10px 0 30px 0; }

    #leaderboardBox {
      background-color: #fff9c4; border: 4px solid #000; border-radius: 10px;
      padding: 20px; margin-bottom: 30px; box-shadow: 6px 6px 0px #000; transform: rotate(-1deg);
    }
    #leaderboardBox h3 {
      font-size: 1.8em; color: var(--comic-red); margin-top: 0; 
      text-align: center; text-transform: uppercase; border-bottom: 3px solid #000; padding-bottom: 10px;
    }
    .rank-item {
      display: flex; justify-content: space-between; font-size: 1.3em; 
      font-weight: bold; padding: 12px 10px; border-bottom: 2px dashed #ccc;
    }
    .rank-1 { color: #f57f17; font-size: 1.5em; background-color: rgba(255, 235, 59, 0.3); border-radius: 5px; } 
    .rank-1::before { content: '👑 '; }

    #newRecordModal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
    }
    .record-content {
      background: white; padding: 30px; border: 5px solid #000; box-shadow: 10px 10px 0px var(--comic-red);
      text-align: center; transform: rotate(-2deg); width: 90%; max-width: 400px;
    }
    .record-content input { font-size: 1.5em; padding: 10px; border: 3px solid #000; font-weight: bold; text-align: center; margin: 20px 0; width: 80%; }
    .record-content button { font-size: 1.2em; padding: 10px 20px; background: var(--comic-green); color: white; font-weight: bold; border: 3px solid #000; cursor: pointer; box-shadow: 4px 4px 0px #000; }

    .back-home { margin-top: 30px; text-decoration: none; color: #555; font-weight: bold; border-bottom: 2px solid #555; display: inline-block; }
  </style>
</head>
<body>

  <h2 class="main-title">Vocab Challenge</h2>
  
  <div id="lobbyContainer" class="comic-box">
    <h3>💥 Select Your Mission! 💥</h3>
    <button class="btn-view-boards" onclick="showGlobalLeaderboard()">🏆 觀看所有英雄榜</button>
    
    <div id="loadingText">正在連線 Firebase...</div>
    <div id="bankList"></div>
  </div>

  <div id="globalLeaderboardContainer" class="comic-box">
    <h2 style="font-size: 2.5em; color: var(--comic-red); margin-top: 0;">🏆 HALL OF FAME 🏆</h2>
    <button class="bank-btn" style="background: #ccc; color: black; padding: 10px 20px; margin-bottom: 30px;" onclick="hideGlobalLeaderboard()">⬅️ 返回大廳</button>
    <div id="allBoardsList">
      </div>
  </div>

  <div id="gameContainer">
    <div class="status-bar comic-box">
      <div id="currentBankName">題庫: --</div>
      <div id="progress">NO. 1 / 20</div>
      <div id="timer">⏱️ 30</div>
    </div>
    
    <div class="status-bar comic-box" style="background-color: white; margin-top: -10px; margin-bottom: 30px;">
        <div id="scoreText">SCORE: 0</div>
    </div>

    <div id="questionArea">
        <p id="question">POW!</p>
    </div>

    <div class="options" id="optionsContainer"></div>
    <center><button id="nextBtn">Next Question ▶️</button></center>
  </div>

  <div id="resultContainer" class="comic-box">
    <h2 style="font-size: 2.5em; color: var(--comic-blue); margin-bottom: 0;">MISSION COMPLETE!</h2>
    <div id="finalScore">0</div>
    
    <div id="leaderboardBox">
      <h3>🏆 TOP 5 HEROES</h3>
      <div id="leaderboardList"></div>
    </div>

    <button class="bank-btn" onclick="location.reload()">Play Again?</button>
  </div>

  <div id="newRecordModal">
    <div class="record-content">
      <h2 style="color: var(--comic-red); font-size: 2.2em; margin: 0;">NEW HIGH SCORE! 🎉</h2>
      <p style="font-weight: bold;">太神啦！你進入了排行榜，請輸入你的大名：</p>
      <input type="text" id="heroName" placeholder="例如: 單字大師" maxlength="10">
      <br>
      <button onclick="saveHighScore()">寫入排行榜！</button>
    </div>
  </div>
  
  <br><a href="index.html" class="back-home">回首頁</a>

  <script type="module">
    import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { db } from './firebase-config.js';

    let allBanks = [];       
    let words = [];          
    let currentBankData = null; 
    let currentQuestionIndex = 0;
    let score = 0;
    const MAX_QUESTIONS = 20; 
    const TIME_LIMIT = 30;    
    
    let timeLeft = TIME_LIMIT;
    let timerInterval;
    let currentQuestion = {};

    // 1. 初始化大廳
    async function initLobby() {
      try {
        const querySnapshot = await getDocs(collection(db, "banks"));
        document.getElementById('loadingText').style.display = 'none';
        
        const container = document.getElementById('bankList');
        querySnapshot.forEach((docSnap) => {
          const bankData = docSnap.data();
          bankData.id = docSnap.id; 
          
          if(bankData.words && bankData.words.length >= 20) {
            allBanks.push(bankData); 
            const btn = document.createElement('button');
            btn.className = 'bank-btn';
            btn.innerText = bankData.title;
            btn.onclick = () => startGame(bankData.id);
            container.appendChild(btn);
          }
        });
      } catch (error) {
        document.getElementById('loadingText').innerText = "連線失敗";
      }
    }

    // 🌟 全局排行榜邏輯 (新增)
    window.showGlobalLeaderboard = () => {
      document.getElementById('lobbyContainer').style.display = 'none';
      document.getElementById('globalLeaderboardContainer').style.display = 'block';

      const container = document.getElementById('allBoardsList');
      container.innerHTML = '';

      if (allBanks.length === 0) {
        container.innerHTML = '<p>目前尚無任何題庫資料！</p>';
        return;
      }

      // 迴圈把每一個題庫的排行榜都畫出來
      allBanks.forEach(bank => {
        const boardBox = document.createElement('div');
        boardBox.className = 'board-card';
        
        let html = `<h3 class="board-title">📖 ${bank.title}</h3>`;
        let board = bank.leaderboard || [];

        if(board.length === 0) {
          html += `<div style="text-align:center; padding: 10px; font-weight: bold; color: #777;">目前尚無紀錄，快來搶首殺！</div>`;
        } else {
          board.forEach((record, index) => {
            html += `
              <div class="rank-item ${index === 0 ? 'rank-1' : ''}">
                <span>${index + 1}. ${record.name}</span>
                <span>${record.score}</span>
              </div>
            `;
          });
        }
        
        boardBox.innerHTML = html;
        container.appendChild(boardBox);
      });
    };

    window.hideGlobalLeaderboard = () => {
      document.getElementById('globalLeaderboardContainer').style.display = 'none';
      document.getElementById('lobbyContainer').style.display = 'block';
    };

    // 2. 遊戲核心邏輯
    function startGame(bankId) {
      currentBankData = allBanks.find(b => b.id === bankId);
      words = currentBankData.words;

      document.getElementById('lobbyContainer').style.display = 'none';
      document.getElementById('gameContainer').style.display = 'block';
      document.getElementById('currentBankName').innerText = `Mission: ${currentBankData.title}`;
      
      currentQuestionIndex = 0;
      score = 0;
      renderQuestion();
    }

    function renderQuestion() {
      if(currentQuestionIndex >= MAX_QUESTIONS) { endGame(); return; }

      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('progress').innerText = `NO. ${currentQuestionIndex + 1} / ${MAX_QUESTIONS}`;
      startTimer();

      const isEngToChi = Math.random() < 0.5;
      const correctWord = words[Math.floor(Math.random() * words.length)];
      currentQuestion = { question: isEngToChi ? correctWord.eng : correctWord.chi, answer: isEngToChi ? correctWord.chi : correctWord.eng };

      document.getElementById('question').innerText = currentQuestion.question;
      document.getElementById('question').style.fontSize = currentQuestion.question.length > 10 ? '2.5em' : '3.5em';

      let options = [currentQuestion.answer];
      while(options.length < 4) {
        let randomWord = words[Math.floor(Math.random() * words.length)];
        let wrongOption = isEngToChi ? randomWord.chi : randomWord.eng;
        if(!options.includes(wrongOption)) options.push(wrongOption);
      }
      options.sort(() => Math.random() - 0.5);

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn'; btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt);
        container.appendChild(btn);
      });
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = TIME_LIMIT;
      document.getElementById('timer').innerText = `⏱️ ${timeLeft}`;
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `⏱️ ${timeLeft}`;
        if(timeLeft <= 0) { clearInterval(timerInterval); timeUp(); }
      }, 1000);
    }

    function checkAnswer(btn, selected) {
      clearInterval(timerInterval);
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true); 

      if (selected === currentQuestion.answer) {
        btn.classList.add('correct');
        score += (timeLeft * 10);
        document.getElementById('scoreText').innerText = `SCORE: ${score}`;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if(b.innerText === currentQuestion.answer) b.classList.add('correct'); });
      }
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function timeUp() {
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true);
      allBtns.forEach(b => { if(b.innerText === currentQuestion.answer) b.classList.add('correct'); });
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentQuestionIndex++; renderQuestion();
    });

    // 3. 遊戲結束與結算
    function renderSingleLeaderboard() {
      const listContainer = document.getElementById('leaderboardList');
      listContainer.innerHTML = '';
      let board = currentBankData.leaderboard || []; 
      
      if(board.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center; padding: 10px;">目前尚無紀錄，成為第一個登榜的英雄吧！</div>';
        return;
      }

      board.forEach((record, index) => {
        const item = document.createElement('div');
        item.className = `rank-item ${index === 0 ? 'rank-1' : ''}`;
        item.innerHTML = `<span>${index + 1}. ${record.name}</span> <span>${record.score}</span>`;
        listContainer.appendChild(item);
      });
    }

    function endGame() {
      document.getElementById('gameContainer').style.display = 'none';
      document.getElementById('finalScore').innerText = score;
      
      let board = currentBankData.leaderboard || [];
      let isHigh = false;
      
      if (board.length < 5 || score > board[board.length - 1].score) {
        if(score > 0) isHigh = true; 
      }

      if (isHigh) {
        document.getElementById('newRecordModal').style.display = 'flex';
      } else {
        renderSingleLeaderboard();
        document.getElementById('resultContainer').style.display = 'block';
      }
    }

    window.saveHighScore = async () => {
      const nameInput = document.getElementById('heroName').value.trim();
      const playerName = nameInput === "" ? "神秘客" : nameInput;

      let board = currentBankData.leaderboard || [];
      board.push({ name: playerName, score: score });
      board.sort((a, b) => b.score - a.score);
      board = board.slice(0, 5);
      
      currentBankData.leaderboard = board;

      try {
        await updateDoc(doc(db, "banks", currentBankData.id), {
          leaderboard: board
        });
        
        document.getElementById('newRecordModal').style.display = 'none';
        renderSingleLeaderboard();
        document.getElementById('resultContainer').style.display = 'block';
        
      } catch (e) {
        console.error(e);
        alert("寫入排行榜失敗，請檢查網路！");
      }
    };

    initLobby();
  </script>
</body>
</html>
