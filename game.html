<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>💥 漫畫單字大挑戰 💥</title>
  <style>
    :root {
      --primary-yellow: #FFEB3B;
      --comic-blue: #2196F3;
      --comic-red: #F44336;
      --comic-green: #4CAF50;
      --border-color: #000;
      --text-color: #000;
    }

    body { 
      font-family: 'Bangers', 'Comic Sans MS', cursive, sans-serif;
      background-color: #f0f0f0; 
      background-image: radial-gradient(#ddd 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-color);
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .comic-box {
      border: 4px solid var(--border-color);
      box-shadow: 7px 7px 0px var(--border-color);
      background-color: white;
      border-radius: 4px;
    }

    h2.main-title {
      font-size: 3em;
      text-transform: uppercase;
      color: var(--comic-red);
      -webkit-text-stroke: 2px var(--border-color);
      text-shadow: 4px 4px 0px var(--border-color);
      margin-bottom: 10px;
      transform: rotate(-2deg);
    }

    /* === 1. 題庫選擇大廳 === */
    #lobbyContainer { width: 100%; max-width: 600px; text-align: center; padding: 30px; margin-top: 50px; }
    #bankList { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
    .bank-btn {
      padding: 20px; font-size: 1.2em; font-weight: bold; cursor: pointer;
      background-color: var(--comic-blue); color: white; border: 3px solid var(--border-color);
      box-shadow: 5px 5px 0px var(--border-color); border-radius: 4px; transition: 0.1s;
    }
    .bank-btn:hover { transform: translate(2px, 2px); box-shadow: 3px 3px 0px var(--border-color); }

    /* === 2. 遊戲主畫面 (左右排版) === */
    #playArea {
      display: none; /* 初始隱藏 */
      width: 100%;
      max-width: 1000px;
      gap: 20px;
      align-items: flex-start;
      justify-content: center;
    }

    #gameContainer { flex: 2; min-width: 300px; }
    
    /* 排行榜面板 */
    #leaderboardContainer { 
      flex: 1; 
      min-width: 250px; 
      padding: 20px; 
      background-color: #fff9c4; 
      transform: rotate(1deg); 
    }
    #leaderboardContainer h3 {
      font-size: 1.8em; color: var(--comic-red); margin-top: 0; 
      text-align: center; text-transform: uppercase; border-bottom: 3px solid #000; padding-bottom: 10px;
    }
    .rank-item {
      display: flex; justify-content: space-between; font-size: 1.2em; 
      font-weight: bold; padding: 10px 0; border-bottom: 2px dashed #ccc;
    }
    .rank-1 { color: #f57f17; font-size: 1.4em; } /* 第一名特別大 */
    .rank-1::before { content: '👑 '; }

    .status-bar { 
      display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; 
      background-color: var(--primary-yellow); padding: 15px; margin-bottom: 20px; transform: rotate(1deg);
    }
    #timer { color: white; background-color: var(--comic-red); padding: 5px 15px; border: 2px solid #000; }

    #questionArea {
      position: relative; background: white; border: 4px solid #000; border-radius: 50px;
      padding: 40px; margin-bottom: 40px; text-align: center; box-shadow: 8px 8px 0px #000;
    }
    #questionArea:after {
      content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 0;
      border: 30px solid transparent; border-top-color: #000; border-bottom: 0; border-left: 0;
      margin-left: -15px; margin-bottom: -30px;
    }
    #question { font-size: 3.5em; font-weight: 900; color: #000; margin: 0; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .option-btn { 
      padding: 25px; font-size: 1.3em; font-weight: bold; cursor: pointer; border: 4px solid var(--border-color); 
      background-color: white; border-radius: 8px; box-shadow: 6px 6px 0px var(--border-color); transition: 0.1s;
    }
    .option-btn:hover:not(:disabled) { background-color: #fdf5e6; transform: scale(1.03); }
    
    .correct { background-color: var(--comic-green) !important; color: white; }
    .wrong { background-color: var(--comic-red) !important; color: white; text-decoration: line-through; }

    #nextBtn { 
      display: none; margin: 40px auto 0 auto; padding: 15px 40px; font-size: 1.5em; 
      background-color: var(--primary-yellow); color: black; border: 4px solid #000;
      box-shadow: 6px 6px 0px #000; cursor: pointer; font-weight: bold;
    }
    
    /* === 3. 遊戲結果與破紀錄彈窗 === */
    #resultContainer { display: none; text-align: center; margin-top: 50px; padding: 40px; width: 100%; max-width: 600px; }
    #finalScore { font-size: 6em; color: var(--comic-green); -webkit-text-stroke: 3px #000; text-shadow: 6px 6px 0px #000; margin: 20px 0; }

    #newRecordModal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
    }
    .record-content {
      background: white; padding: 30px; border: 5px solid #000; box-shadow: 10px 10px 0px var(--comic-red);
      text-align: center; transform: rotate(-2deg);
    }
    .record-content input {
      font-size: 1.5em; padding: 10px; border: 3px solid #000; font-weight: bold; text-align: center; margin: 20px 0; width: 80%;
    }
    .record-content button {
      font-size: 1.2em; padding: 10px 20px; background: var(--comic-green); color: white; font-weight: bold;
      border: 3px solid #000; cursor: pointer; box-shadow: 4px 4px 0px #000;
    }

    .back-home { margin-top: 50px; text-decoration: none; color: #555; font-weight: bold; border-bottom: 2px solid #555; }

    /* 手機版排版調整 */
    @media (max-width: 768px) {
      #playArea { flex-direction: column-reverse; align-items: center; }
      #leaderboardContainer { width: 100%; max-width: 500px; }
    }
  </style>
</head>
<body>

  <h2 class="main-title">Vocab Challenge</h2>
  
  <div id="lobbyContainer" class="comic-box">
    <h3>💥 Select Your Mission! 💥</h3>
    <div id="loadingText">正在連線 Firebase...</div>
    <div id="bankList"></div>
  </div>

  <div id="playArea">
    
    <div id="gameContainer">
      <div class="status-bar comic-box">
        <div id="currentBankName">題庫: --</div>
        <div id="progress">NO. 1 / 20</div>
        <div id="timer">⏱️ 30</div>
      </div>
      
      <div class="status-bar comic-box" style="background-color: white; margin-top: -10px; margin-bottom: 30px;">
          <div id="scoreText">SCORE: 0</div>
      </div>

      <div id="questionArea">
          <p id="question">POW!</p>
      </div>

      <div class="options" id="optionsContainer"></div>
      <center><button id="nextBtn">Next Question ▶️</button></center>
    </div>

    <div id="leaderboardContainer" class="comic-box">
      <h3>🏆 TOP HEROES</h3>
      <div id="leaderboardList">
        </div>
    </div>

  </div>

  <div id="resultContainer" class="comic-box">
    <h2 style="font-size: 3em; color: var(--comic-blue);">MISSION COMPLETE!</h2>
    <div id="finalScore">0</div>
    <button class="bank-btn" onclick="location.reload()">Play Again?</button>
  </div>

  <div id="newRecordModal">
    <div class="record-content">
      <h2 style="color: var(--comic-red); font-size: 2.5em; margin: 0;">NEW HIGH SCORE! 🎉</h2>
      <p style="font-weight: bold;">太神啦！你進入了排行榜，請輸入你的大名：</p>
      <input type="text" id="heroName" placeholder="例如: 單字大師" maxlength="10">
      <br>
      <button onclick="saveHighScore()">寫入排行榜！</button>
    </div>
  </div>
  
  <br><a href="index.html" class="back-home">回首頁</a>

  <script type="module">
    import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { db } from './firebase-config.js';

    let allBanks = [];       
    let words = [];          
    let currentBankData = null; // 儲存當前題庫完整資料 (包含 ID 和 排行榜)
    let currentQuestionIndex = 0;
    let score = 0;
    const MAX_QUESTIONS = 20; 
    const TIME_LIMIT = 30;    
    
    let timeLeft = TIME_LIMIT;
    let timerInterval;
    let currentQuestion = {};

    // 1. 初始化大廳
    async function initLobby() {
      try {
        const querySnapshot = await getDocs(collection(db, "banks"));
        document.getElementById('loadingText').style.display = 'none';
        
        const container = document.getElementById('bankList');
        querySnapshot.forEach((docSnap) => {
          const bankData = docSnap.data();
          bankData.id = docSnap.id; // 重要：紀錄文件 ID 以利後續更新排行榜
          
          if(bankData.words && bankData.words.length >= 20) {
            allBanks.push(bankData); 
            const btn = document.createElement('button');
            btn.className = 'bank-btn';
            btn.innerText = bankData.title;
            btn.onclick = () => startGame(bankData.id);
            container.appendChild(btn);
          }
        });
      } catch (error) {
        document.getElementById('loadingText').innerText = "連線失敗";
      }
    }

    // 2. 開始遊戲
    function startGame(bankId) {
      currentBankData = allBanks.find(b => b.id === bankId);
      words = currentBankData.words;

      document.getElementById('lobbyContainer').style.display = 'none';
      document.getElementById('playArea').style.display = 'flex';
      document.getElementById('currentBankName').innerText = `Mission: ${currentBankData.title}`;
      
      currentQuestionIndex = 0;
      score = 0;
      
      renderLeaderboard(); // 繪製右側排行榜
      renderQuestion();
    }

    // 🏆 繪製右側排行榜
    function renderLeaderboard() {
      const listContainer = document.getElementById('leaderboardList');
      listContainer.innerHTML = '';
      
      // 確保就算舊題庫沒有 leaderboard 欄位也不會報錯
      let board = currentBankData.leaderboard || []; 
      
      if(board.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center; padding: 20px;">目前尚無紀錄<br>快來搶首殺！</div>';
        return;
      }

      board.forEach((record, index) => {
        const item = document.createElement('div');
        item.className = `rank-item ${index === 0 ? 'rank-1' : ''}`;
        item.innerHTML = `<span>${index + 1}. ${record.name}</span> <span>${record.score}</span>`;
        listContainer.appendChild(item);
      });
    }

    // 3. 遊戲邏輯 (渲染、計時、對錯檢查)
    function renderQuestion() {
      if(currentQuestionIndex >= MAX_QUESTIONS) { endGame(); return; }

      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('progress').innerText = `NO. ${currentQuestionIndex + 1} / ${MAX_QUESTIONS}`;
      startTimer();

      const isEngToChi = Math.random() < 0.5;
      const correctWord = words[Math.floor(Math.random() * words.length)];
      currentQuestion = { question: isEngToChi ? correctWord.eng : correctWord.chi, answer: isEngToChi ? correctWord.chi : correctWord.eng };

      document.getElementById('question').innerText = currentQuestion.question;
      document.getElementById('question').style.fontSize = currentQuestion.question.length > 10 ? '2.5em' : '3.5em';

      let options = [currentQuestion.answer];
      while(options.length < 4) {
        let randomWord = words[Math.floor(Math.random() * words.length)];
        let wrongOption = isEngToChi ? randomWord.chi : randomWord.eng;
        if(!options.includes(wrongOption)) options.push(wrongOption);
      }
      options.sort(() => Math.random() - 0.5);

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn'; btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt);
        container.appendChild(btn);
      });
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = TIME_LIMIT;
      document.getElementById('timer').innerText = `⏱️ ${timeLeft}`;
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `⏱️ ${timeLeft}`;
        if(timeLeft <= 0) { clearInterval(timerInterval); timeUp(); }
      }, 1000);
    }

    function checkAnswer(btn, selected) {
      clearInterval(timerInterval);
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true); 

      if (selected === currentQuestion.answer) {
        btn.classList.add('correct');
        score += (timeLeft * 10);
        document.getElementById('scoreText').innerText = `SCORE: ${score}`;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if(b.innerText === currentQuestion.answer) b.classList.add('correct'); });
      }
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function timeUp() {
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true);
      allBtns.forEach(b => { if(b.innerText === currentQuestion.answer) b.classList.add('correct'); });
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentQuestionIndex++; renderQuestion();
    });

    // 4. 🏆 遊戲結束與結算
    function endGame() {
      document.getElementById('playArea').style.display = 'none';
      document.getElementById('finalScore').innerText = score;
      
      // 檢查是否上榜 (我們取前 5 名)
      let board = currentBankData.leaderboard || [];
      let isHigh = false;
      
      // 如果榜單不到5人，或者你的分數大於榜上最後一名的分數，就是上榜！
      if (board.length < 5 || score > board[board.length - 1].score) {
        // 但如果分數是 0 就不給上榜
        if(score > 0) isHigh = true; 
      }

      if (isHigh) {
        document.getElementById('newRecordModal').style.display = 'flex';
      } else {
        document.getElementById('resultContainer').style.display = 'block';
      }
    }

    // 5. 🏆 寫入新紀錄到 Firebase
    window.saveHighScore = async () => {
      const nameInput = document.getElementById('heroName').value.trim();
      const playerName = nameInput === "" ? "神秘客" : nameInput;

      let board = currentBankData.leaderboard || [];
      // 把新紀錄推進陣列
      board.push({ name: playerName, score: score });
      // 重新由高到低排序
      board.sort((a, b) => b.score - a.score);
      // 只保留前 5 名
      board = board.slice(0, 5);

      try {
        // 更新 Firebase
        await updateDoc(doc(db, "banks", currentBankData.id), {
          leaderboard: board
        });
        
        // 隱藏命名視窗，顯示結果視窗
        document.getElementById('newRecordModal').style.display = 'none';
        document.getElementById('resultContainer').style.display = 'block';
        alert("成功登入排行榜！");
      } catch (e) {
        console.error(e);
        alert("寫入排行榜失敗，請檢查網路！");
      }
    };

    initLobby();
  </script>
</body>
</html>
