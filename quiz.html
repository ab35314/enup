<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>💥 漫畫單字大挑戰 - 測驗模式 💥</title>
  <style>
    /* 全域漫畫風格設定 */
    :root {
      --primary-yellow: #FFEB3B;
      --comic-blue: #2196F3;
      --comic-red: #F44336;
      --comic-green: #4CAF50;
      --border-color: #000;
      --text-color: #000;
    }

    body { 
      font-family: 'Bangers', 'Comic Sans MS', cursive, sans-serif;
      background-color: #f0f0f0; 
      background-image: radial-gradient(#ddd 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-color);
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .comic-box {
      border: 4px solid var(--border-color);
      box-shadow: 7px 7px 0px var(--border-color);
      background-color: white;
      border-radius: 4px;
    }

    h2.main-title {
      font-size: 3em;
      text-transform: uppercase;
      color: var(--comic-blue);
      -webkit-text-stroke: 2px var(--border-color);
      text-shadow: 4px 4px 0px var(--border-color);
      margin-bottom: 10px;
      transform: rotate(-1deg);
    }

    #lobbyContainer { width: 100%; max-width: 600px; text-align: center; padding: 30px; margin-top: 50px; }
    #bankList { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }

    .bank-btn {
      padding: 20px; font-size: 1.2em; font-weight: bold; cursor: pointer;
      background-color: var(--comic-blue); color: white; border: 3px solid var(--border-color);
      box-shadow: 5px 5px 0px var(--border-color); border-radius: 4px; transition: 0.1s;
    }
    .bank-btn:hover { transform: translate(2px, 2px); box-shadow: 3px 3px 0px var(--border-color); }

    #quizContainer { display: none; width: 100%; max-width: 700px; }
    .status-bar { 
      display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; 
      background-color: var(--primary-yellow); padding: 15px; margin-bottom: 30px;
    }
    #examBadge { 
      color: white; background-color: var(--comic-red); padding: 5px 15px;
      border: 2px solid #000; transform: rotate(3deg);
    }

    #questionArea {
      position: relative; background: white; border: 4px solid #000; border-radius: 10px;
      padding: 40px; margin-bottom: 40px; text-align: center; box-shadow: 8px 8px 0px #000;
    }
    #question { font-size: 3.5em; font-weight: 900; color: #000; margin: 0; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .option-btn { 
      padding: 25px; font-size: 1.3em; font-weight: bold; cursor: pointer; 
      border: 4px solid var(--border-color); background-color: white; border-radius: 8px; 
      box-shadow: 6px 6px 0px var(--border-color); transition: 0.1s;
    }
    .option-btn:hover:not(:disabled) { background-color: #e3f2fd; transform: scale(1.02); }

    #resultContainer { display: none; text-align: center; width: 100%; max-width: 700px; margin-top: 20px; padding: 30px; }
    #finalScore { font-size: 6em; color: var(--comic-green); -webkit-text-stroke: 3px #000; text-shadow: 6px 6px 0px #000; margin: 10px 0; }

    .mistake-list { margin-top: 30px; text-align: left; display: flex; flex-direction: column; gap: 15px; }
    .mistake-item {
      padding: 15px; background-color: #fff; border: 3px solid #000;
      box-shadow: 4px 4px 0px #000; border-radius: 8px; font-size: 1.1em; line-height: 1.5;
    }
    .mistake-item strong { color: var(--comic-blue); font-size: 1.2em; }
    .ans-wrong { color: var(--comic-red); font-weight: bold; }
    .ans-correct { color: var(--comic-green); font-weight: bold; }

    .back-home { margin-top: 30px; text-decoration: none; color: #555; font-weight: bold; border-bottom: 2px solid #555; display: inline-block; }
  </style>
</head>
<body>

  <h2 class="main-title">Vocab Exam</h2>
  
  <div id="lobbyContainer" class="comic-box">
    <h3>📝 準備測驗！📝</h3>
    <p>請選擇測驗題庫 (共 20 題，滿分 100 分，題目不重複)</p>
    <div id="loadingText">正在連線 Firebase...</div>
    <div id="bankList"></div>
  </div>

  <div id="quizContainer">
    <div class="status-bar comic-box">
      <div id="currentBankName">題庫: --</div>
      <div id="progress">NO. 1 / 20</div>
      <div id="examBadge">EXAMING</div>
    </div>
    <div id="questionArea">
        <p id="question">載入中...</p>
    </div>
    <div class="options" id="optionsContainer"></div>
  </div>

  <div id="resultContainer" class="comic-box">
    <h2 style="font-size: 2.5em; color: var(--comic-red);">EXAM FINISHED!</h2>
    <p style="font-size: 1.2em; font-weight: bold;">你的最終成績是：</p>
    <div id="finalScore">0</div>
    <div id="mistakesSection"></div>
    <button class="bank-btn" style="margin-top: 30px;" onclick="location.reload()">再測一次</button>
  </div>
  
  <br><a href="index.html" class="back-home">回首頁</a>

  <script type="module">
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { db } from './firebase-config.js';

    let allBanks = [];       
    let words = [];          
    let questionPool = []; // 新增：用來存放洗牌後的不重複題目
    let currentBankTitle = "";
    let currentQuestionIndex = 0;
    
    let score = 0;
    let mistakes = []; 
    
    const MAX_QUESTIONS = 20; 
    const POINTS_PER_QUESTION = 100 / MAX_QUESTIONS; 
    let currentQuestion = {};

    async function initLobby() {
      try {
        const querySnapshot = await getDocs(collection(db, "banks"));
        document.getElementById('loadingText').style.display = 'none';
        
        if(querySnapshot.empty) {
          document.getElementById('bankList').innerHTML = "<p>目前沒有題庫，請先去建立！</p>";
          return;
        }

        const container = document.getElementById('bankList');
        
        querySnapshot.forEach((doc) => {
          const bankData = doc.data();
          if(bankData.words && bankData.words.length >= 20) {
            allBanks.push(bankData); 
            const btn = document.createElement('button');
            btn.className = 'bank-btn';
            btn.innerText = bankData.title;
            btn.onclick = () => startQuiz(bankData.title);
            container.appendChild(btn);
          }
        });

        if(allBanks.length === 0) {
            document.getElementById('bankList').innerHTML = "<p>找不到包含 20 筆以上單字的題庫，無法進行測驗。</p>";
        }

      } catch (error) {
        console.error(error);
        document.getElementById('loadingText').innerText = "連線失敗，請檢查網路。";
      }
    }

    function startQuiz(bankTitle) {
      const selectedBank = allBanks.find(b => b.title === bankTitle);
      if(!selectedBank) return;

      words = selectedBank.words;
      
      // 【核心修改】：將單字陣列複製一份，並打亂順序，變成不重複的題目池
      questionPool = [...words].sort(() => Math.random() - 0.5);

      currentBankTitle = bankTitle;

      document.getElementById('lobbyContainer').style.display = 'none';
      document.getElementById('quizContainer').style.display = 'block';
      document.getElementById('currentBankName').innerText = `題庫: ${currentBankTitle}`;
      
      currentQuestionIndex = 0;
      score = 0;
      mistakes = [];

      renderQuestion();
    }

    function renderQuestion() {
      if(currentQuestionIndex >= MAX_QUESTIONS) {
        endQuiz();
        return;
      }

      document.getElementById('progress').innerText = `NO. ${currentQuestionIndex + 1} / ${MAX_QUESTIONS}`;

      const isEngToChi = Math.random() < 0.5;
      
      // 【核心修改】：不再隨機抽，而是依序從打亂好的 questionPool 裡面拿題目
      const correctWord = questionPool[currentQuestionIndex];
      
      currentQuestion = {
        question: isEngToChi ? correctWord.eng : correctWord.chi,
        answer: isEngToChi ? correctWord.chi : correctWord.eng
      };

      document.getElementById('question').innerText = currentQuestion.question;

      if(currentQuestion.question.length > 10) {
          document.getElementById('question').style.fontSize = '2.5em';
      } else {
          document.getElementById('question').style.fontSize = '3.5em';
      }

      // 產生選項（選項依然從原本的 words 裡面隨機抽，當作干擾項）
      let options = [currentQuestion.answer];
      while(options.length < 4) {
        let randomWord = words[Math.floor(Math.random() * words.length)];
        let wrongOption = isEngToChi ? randomWord.chi : randomWord.eng;
        if(!options.includes(wrongOption)) options.push(wrongOption);
      }
      options.sort(() => Math.random() - 0.5);

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        
        btn.onclick = () => {
          const allBtns = document.querySelectorAll('.option-btn');
          allBtns.forEach(b => b.disabled = true);
          checkAnswer(opt);
        };
        container.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      if (selected === currentQuestion.answer) {
        score += POINTS_PER_QUESTION; 
      } else {
        mistakes.push({
          q: currentQuestion.question,
          user: selected,
          correct: currentQuestion.answer
        });
      }

      setTimeout(() => {
        currentQuestionIndex++;
        renderQuestion();
      }, 200);
    }

    function endQuiz() {
      document.getElementById('quizContainer').style.display = 'none';
      document.getElementById('resultContainer').style.display = 'block';
      document.getElementById('finalScore').innerText = score;

      const mistakesSection = document.getElementById('mistakesSection');
      
      if (mistakes.length === 0) {
        mistakesSection.innerHTML = `<h3 style="color: var(--comic-green);">太神啦！全對滿分！💯</h3>`;
      } else {
        let html = `<h3>❌ 錯誤訂正 (${mistakes.length}題)：</h3><div class="mistake-list">`;
        mistakes.forEach(item => {
          html += `
            <div class="mistake-item">
              <strong>題目: ${item.q}</strong><br>
              <span class="ans-wrong">你的答案: ${item.user}</span><br>
              <span class="ans-correct">正確答案: ${item.correct}</span>
            </div>
          `;
        });
        html += `</div>`;
        mistakesSection.innerHTML = html;
      }
    }

    initLobby();
  </script>
</body>
</html>
